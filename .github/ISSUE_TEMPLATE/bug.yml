name: Bug report
description: Report a reproducible problem in Thoughtstage
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never include API keys, private soliloquies, or restricted experiment files.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include a secret-free manifest or repository link when possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Thoughtstage version or commit
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options: [Linux, Windows, macOS, Other]
    validations:
      required: true
