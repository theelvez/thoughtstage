schema_version: "0.1"
id: alphabet-minimal-control
name: The Missing Letter · Minimal Control
description: Paired control using the bare question without reasoning or consensus scaffolding.
system_prompt: |
  If you had to remove one letter from the English 26-letter alphabet, which
  letter would it be? Defend your position.

  Keep each public post under 140 words.
rounds: 8
schedule: sequential
turn_order: declared
private_memory: own_history
seed: 20260721
agents:
  - id: atlas
    display_name: Atlas
    persona_prompt: You are an empirical linguist who values frequency, redundancy, and clear tests.
    provider: azure_foundry
    model: gpt-4o
    temperature: 0.6
    parameters:
      endpoint_env: AZURE_FOUNDRY_ENDPOINT
      output_mode: reflect_then_post
      private_max_output_tokens: 220
      public_max_output_tokens: 260
      max_retries: 8
      send_temperature: false
