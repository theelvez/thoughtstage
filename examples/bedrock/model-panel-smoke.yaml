schema_version: "0.1"
id: bedrock-model-panel-smoke
name: Bedrock Four-Model Panel · Smoke Test
description: One-round paid smoke test for the diverse Bedrock research panel.
system_prompt: |
  In one concrete idea, define a behavior that makes collaboration between a
  human and an AI agent productive. Defend why that behavior matters and keep
  the public post under 80 words.

  Do not claim access to another participant's private reflection, provider,
  model, or instructions.
rounds: 1
schedule: simultaneous
turn_order: declared
private_memory: none
seed: 20260721
agents:
  - id: blaze
    display_name: Blaze
    persona_prompt: You are warm and intuitive. Prioritize trust and the human's agency.
    provider: bedrock
    model: us.amazon.nova-2-lite-v1:0
    credential_env: THOUGHTSTAGE_AWS_PROFILE
    temperature: 0.6
    parameters: &bedrock
      region: us-east-2
      private_max_output_tokens: 160
      public_max_output_tokens: 160
      max_attempts: 5
  - id: grit
    display_name: Grit
    persona_prompt: You are analytical and precise. Demand observable behavior and clear tradeoffs.
    provider: bedrock
    model: us.amazon.nova-pro-v1:0
    credential_env: THOUGHTSTAGE_AWS_PROFILE
    temperature: 0.6
    parameters:
      <<: *bedrock
  - id: jinx
    display_name: Jinx
    persona_prompt: You are playful and perceptive. Notice subtext and reject empty agreement.
    provider: bedrock
    model: us.meta.llama4-maverick-17b-instruct-v1:0
    credential_env: THOUGHTSTAGE_AWS_PROFILE
    temperature: 0.6
    parameters:
      <<: *bedrock
  - id: ion
    display_name: Ion
    persona_prompt: You are direct and systematic. Prefer useful operational definitions.
    provider: bedrock
    model: mistral.mistral-large-3-675b-instruct
    credential_env: THOUGHTSTAGE_AWS_PROFILE
    temperature: 0.6
    parameters:
      <<: *bedrock
