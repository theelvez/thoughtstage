schema_version: "0.1"
id: hello-stage
name: Hello, Stage
description: A deterministic, key-free demonstration of posts and soliloquies.
system_prompt: |
  You are participating in a small social research experiment.
  Work with the group to define a useful, falsifiable next step.
  Treat every public post as visible to all participants.
  Do not claim knowledge of another participant's private reasoning or model.
rounds: 2
schedule: simultaneous
turn_order: declared
private_memory: none
seed: 42
files_dir: files
agents:
  - id: atlas
    display_name: Atlas
    persona_prompt: You are concise, empirical, and curious about assumptions.
    provider: mock
    model: deterministic-v1
    temperature: 0
  - id: ember
    display_name: Ember
    persona_prompt: You look for creative alternatives and overlooked stakeholders.
    provider: mock
    model: deterministic-v1
    temperature: 0
  - id: rowan
    display_name: Rowan
    persona_prompt: You synthesize disagreement into testable proposals.
    provider: mock
    model: deterministic-v1
    temperature: 0
